name: Keep Render Awake

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: keep-render-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            --retry-all-errors \
            "https://surebet-telegram-bot-luqueta091.onrender.com/health"
